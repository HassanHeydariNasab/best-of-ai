baseURL = "https://bestofai.io/"
locale = "en-US"
title = "Best of AI"
enableRobotsTXT = true

[params]
  description = "Handpicked AI tools — no fluff, no mediocre apps. Every tool carefully selected for quality, innovation, and real-world impact."
  githubRepo  = "https://github.com/best-of-ai/best-of-ai"
  siteURL     = "https://bestofai.io"

[outputs]
  home = ["HTML", "JSON"]

[mediaTypes]
  [mediaTypes."application/json"]
    suffixes = ["json"]

[outputFormats]
  [outputFormats.JSON]
    mediaType = "application/json"
    baseName  = "index"
    isPlainText = true
    notAlternative = true

[markup]
  [markup.goldmark.renderer]
    unsafe = true
